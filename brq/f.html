<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تدريب أعلام الدول</title>
  <link rel="preconnect" href="https://flagcdn.com" crossorigin>
  <style>
    :root{
      --bg:#0f172a; /* slate-900 */
      --panel:#111827; /* gray-900 */
      --muted:#9ca3af; /* gray-400 */
      --text:#e5e7eb; /* gray-200 */
      --accent:#22c55e; /* green-500 */
      --accent-2:#3b82f6; /* blue-500 */
      --wrong:#ef4444; /* red-500 */
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui, -apple-system, Segoe UI, Roboto, Noto Sans, Ubuntu, Cantarell, Helvetica, Arial;
      background:linear-gradient(135deg, #0b1022 0%, #0f172a 70%);
      color:var(--text);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
    }
    .container{
      width:min(980px, 94vw); margin:40px auto; padding:24px; background:rgba(17,24,39,0.7);
      border:1px solid rgba(255,255,255,0.06); border-radius:16px; backdrop-filter: blur(8px);
      box-shadow:0 20px 60px rgba(0,0,0,0.45);
    }
    header{display:flex; gap:16px; align-items:center; justify-content:space-between; flex-wrap:wrap}
    h1{margin:0; font-size:clamp(20px, 3.5vw, 28px)}
    .controls{display:flex; gap:12px; align-items:center; flex-wrap:wrap}
    select, input[type="text"], button{
      padding:10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.08); background:#0b1220; color:var(--text);
      outline:none
    }
    button{cursor:pointer; transition:.2s ease; border-color:transparent}
    button.primary{background:var(--accent-2);}
    button.secondary{background:#1f2937}
    button:hover{filter:brightness(1.1)}
    .grid{display:grid; grid-template-columns: 1.2fr 1fr; gap:18px; margin-top:20px}
    @media (max-width: 900px){.grid{grid-template-columns:1fr}}

    .flag-panel{background:#0b1220; border-radius:14px; border:1px solid rgba(255,255,255,0.06); padding:18px}
    .flag-wrap{position:relative; width:100%; aspect-ratio: 4 / 3; background:#0f172a; display:flex; align-items:center; justify-content:center; border-radius:12px; overflow:hidden}
    .flag{max-width:100%; max-height:100%; object-fit:contain}
    .skeleton{width:70%; height:70%; border-radius:10px; background:linear-gradient(90deg, #111827, #1f2937, #111827); background-size:200% 100%; animation:shimmer 1.2s infinite}
    @keyframes shimmer {0%{background-position:0 0} 100%{background-position:200% 0}}

    .answer{display:flex; gap:8px; margin-top:14px}
    .answer input{flex:1}
    .help{color:var(--muted); font-size:13px; margin-top:6px}

    .stats{background:#0b1220; border-radius:14px; border:1px solid rgba(255,255,255,0.06); padding:18px}
    .stats .row{display:flex; justify-content:space-between; margin:6px 0; color:#cbd5e1}
    .tags{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
    .tag{padding:6px 10px; background:#0f172a; border:1px solid rgba(255,255,255,0.06); border-radius:20px; font-size:12px}

    .result{margin-top:10px; min-height:22px}
    .correct{color:var(--accent)}
    .wrong{color:var(--wrong)}

    details{margin-top:16px}
    summary{cursor:pointer; color:#cbd5e1}
    code{background:#0f172a; padding:2px 6px; border-radius:6px}
    .footer{margin-top:18px; text-align:center; color:var(--muted); font-size:12px}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>تدريب أعلام الدول والأقاليم (250+)</h1>
      <div class="controls">
        <select id="regionFilter">
          <option value="all">كل المناطق</option>
          <option value="africa">أفريقيا</option>
          <option value="americas">الأمريكيتان</option>
          <option value="asia">آسيا</option>
          <option value="europe">أوروبا</option>
          <option value="oceania">أوقيانوسيا</option>
          <option value="antarctic">القطب الجنوبي</option>
          <option value="territories">أقاليم وتبعيات</option>
        </select>
        <select id="mode">
          <option value="country">اسم الدولة/الإقليم</option>
          <option value="code">رمز الدولة (ISO-2)</option>
        </select>
        <button id="resetBtn" class="secondary">إعادة</button>
      </div>
    </header>

    <div class="grid">
      <section class="flag-panel">
        <div class="flag-wrap">
          <div class="skeleton" id="loader"></div>
          <img id="flag" class="flag" alt="العلم" hidden />
        </div>
        <div class="answer">
          <input id="answer" type="text" placeholder="أدخل الاسم بالعربية أو الإنجليزية..." autocomplete="off" />
          <button id="checkBtn" class="primary">تحقق</button>
          <button id="skipBtn" class="secondary">تخطي</button>
        </div>
        <div class="help">تلميحات: اكتب بالعربية أو الإنجليزية. تجاهل همزات/تشكيل. أمثلة: السعودية / Saudi Arabia</div>
        <div id="feedback" class="result"></div>
      </section>

      <aside class="stats">
        <div class="row"><span>السؤال:</span><strong id="qIndex">-</strong></div>
        <div class="row"><span>عدد صحيح:</span><strong id="correct">0</strong></div>
        <div class="row"><span>عدد خطأ/تخطي:</span><strong id="wrong">0</strong></div>
        <div class="tags" id="tags"></div>

        <details>
          <summary>روابط الصور</summary>
          <p>تعتمد الصور على flagcdn.com بصيغة PNG/WebP. مثال:</p>
          <code>https://flagcdn.com/w320/sa.png</code>
        </details>
      </aside>
    </div>
    <footer class="footer">made by mohammed alamanie</footer>
  </div>

  <script src="./f.js"></script>
</body>
</html>
